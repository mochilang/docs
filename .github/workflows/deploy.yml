name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline

      - name: Generate release docs
        run: node scripts/gen-releases.js

      - uses: actions/cache@v4
        with:
          path: |
            .docusaurus
            node_modules/.cache
          key: docusaurus-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('docs/**', 'src/**', 'docusaurus.config.js', 'sidebars.js') }}
          restore-keys: |
            docusaurus-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            docusaurus-${{ runner.os }}-

      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=mochi-lang --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
